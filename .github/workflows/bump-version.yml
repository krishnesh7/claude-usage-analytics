name: Bump plugin version on merge to main

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip the commit the workflow itself creates to avoid an infinite loop.
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token so the push triggers downstream workflows if needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in plugin.json
        id: bump
        run: |
          FILE=".claude-plugin/plugin.json"
          current=$(jq -r '.version' "$FILE")
          IFS='.' read -r major minor patch <<< "$current"
          next="$major.$minor.$((patch + 1))"
          jq --arg v "$next" '.version = $v' "$FILE" > tmp.json && mv tmp.json "$FILE"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next"       >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore: bump version ${{ steps.bump.outputs.current }} → ${{ steps.bump.outputs.next }}"
          git push
