<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>claude-usage-analytics architecture</title>
<desc>Pipeline flow: Claude Code session transcripts are read by an incremental parser into a SQLite database, then analytics views compute pricing, SDLC classification and efficiency scores, feeding a live dashboard, an auto-updated usage doc, and CLI slash commands.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="500" fill="#FFFFFF"/>

<rect x="200" y="20" width="280" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">Session transcripts</text>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">~/.claude/projects/**/*.jsonl</text>

<line x1="340" y1="76" x2="340" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="102" font-family="sans-serif" font-size="12" fill="#5F5E5A">JSONL lines</text>

<rect x="200" y="120" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="138" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Incremental parser</text>
<text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">parser/parse.mjs</text>

<line x1="340" y1="176" x2="340" y2="220" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="202" font-family="sans-serif" font-size="12" fill="#5F5E5A">writes rows</text>

<rect x="200" y="220" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="340" y="238" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404">SQLite (usage.db)</text>
<text x="340" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#27500A">sessions · turns · tools</text>

<line x1="340" y1="276" x2="340" y2="320" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="302" font-family="sans-serif" font-size="12" fill="#5F5E5A">reads via SQL</text>

<rect x="200" y="320" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="338" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Analytics views</text>
<text x="340" y="358" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">pricing · classify · projects</text>

<line x1="340" y1="376" x2="132.5" y2="420" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="376" x2="337.5" y2="420" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="376" x2="542.5" y2="420" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="420" width="185" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="132.5" y="438" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Live dashboard</text>
<text x="132.5" y="458" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">serve.py → :7777</text>

<rect x="245" y="420" width="185" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="337.5" y="438" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">CLAUDE_USAGE.md</text>
<text x="337.5" y="458" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">doc.py (auto-updated)</text>

<rect x="450" y="420" width="185" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="542.5" y="438" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Slash commands</text>
<text x="542.5" y="458" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">cli.py → /usage, /cu</text>

<rect x="40" y="486" width="12" height="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="58" y="496" font-family="sans-serif" font-size="11" fill="#5F5E5A">external source</text>
<rect x="180" y="486" width="12" height="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="198" y="496" font-family="sans-serif" font-size="11" fill="#5F5E5A">service / view</text>
<rect x="320" y="486" width="12" height="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="338" y="496" font-family="sans-serif" font-size="11" fill="#5F5E5A">database</text>
</svg>
